<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YMAX | Login</title>

<meta name="description" content="Login to your YMAX account">

<link rel="stylesheet" href="css/style.css">

<style>

.auth-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1d4ed8);
    padding:40px 20px;
}

.auth-card{
    width:100%;
    max-width:450px;
    background:#1e293b;
    border-radius:16px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.auth-card h1{
    text-align:center;
    margin-bottom:10px;
}

.auth-card p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.auth-card label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.auth-card input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.row a{
    color:#38bdf8;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:#0f172a;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    background:#ffffff;
}

.google-btn{
    display:block;
    width:100%;
    margin-top:15px;
    padding:15px;
    border:2px solid #38bdf8;
    border-radius:8px;
    color:white;
    text-decoration:none;
    text-align:center;
}

.google-btn:hover{
    background:#38bdf8;
    color:#0f172a;
}

.bottom-link{
    margin-top:25px;
    text-align:center;
}

.bottom-link a{
    color:#38bdf8;
    text-decoration:none;
}

.back-home{
    margin-top:15px;
    text-align:center;
}

.back-home a{
    color:#94a3b8;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="auth-page">

<div class="auth-card">

<h1>Welcome Back</h1>

<p>Login to your YMAX account</p>

<form id="loginForm">

<label>Email Address</label>
<input
id="email"
type="email"
placeholder="Enter your email"
required>

<label>Password</label>
<input
id="password"
type="password"
placeholder="Enter your password"
required>
<div class="row">

<label>

<input type="checkbox">

 Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button class="login-btn">

Login

</button>

</form>

<a href="#" class="google-btn">

Continue with Google

</a>

<div class="bottom-link">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</div>

<div class="back-home">

<a href="index.html">

← Back to Home

</a>

</div>

</div>

</div>

    <script src="js/script.js"></script>
<script type="module" src="js/login.js"></script>
    
</body>
</html>

</body>

</html>
